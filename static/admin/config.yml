# 登录授权方式（Netlify Git Gateway）
backend:
  name: git-gateway
  branch: main # 你的代码主分支

# 上传图片存储路径（对应Hugo static目录）
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

# 文章配置（完全匹配PaperMod文章格式）
collections:
  - name: posts
    label: 博客文章
    folder: content/posts
    create: true # 允许新建文章
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # 文件名格式
    editor:
      preview: false # 关闭预览，提升手机流畅度
    fields:
      - {label: "文章标题", name: title, widget: string}
      - {label: "发布日期", name: date, widget: datetime}
      - {label: "标签", name: tags, widget: list, required: false}
      - {label: "是否草稿", name: draft, widget: boolean, default: true}
      - {label: "文章正文", name: body, widget: markdown}

# 可选：关于页面编辑
  - name: page
    label: 独立页面
    folder: content
    create: false
    filter: {field: "layout", value: "page"}
    fields:
      - {label: "标题", name: title, widget: string}
      - {label: "草稿", name: draft, widget: boolean, default: false}
      - {label: "正文", name: body, widget: markdown}